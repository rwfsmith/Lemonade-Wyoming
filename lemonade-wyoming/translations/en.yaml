---
configuration:
  stt_model:
    name: STT Model
    description: >-
      Whisper model used for speech-to-text.  Larger models are more accurate
      but slower ('Whisper-Large-v3-Turbo' is a good balance).  Select
      'custom' and fill in 'STT Custom Model' for unlisted models.
  stt_custom_model:
    name: STT Custom Model
    description: >-
      Name of a custom Whisper model in the Lemonade registry
      (only used when STT Model is set to 'custom').
  stt_backend:
    name: STT Backend
    description: >-
      Inference backend for Whisper.  'auto' will pick the best available.
      Options include whisper.cpp on CPU/NPU/Vulkan, or FastFlowLM on AMD NPU.
  stt_language:
    name: STT Language
    description: >-
      Language hint for Whisper transcription.  'auto' enables auto-detection.
  stt_beam_size:
    name: STT Beam Size
    description: >-
      Number of candidates to consider during transcription (0 = auto).

  llm_model:
    name: LLM Model
    description: >-
      Large language model for the conversation agent.  Select 'custom' and
      fill in 'LLM Custom Model' for unlisted models.
  llm_custom_model:
    name: LLM Custom Model
    description: >-
      Name of a custom LLM in the Lemonade registry
      (only used when LLM Model is set to 'custom').
  llm_backend:
    name: LLM Backend
    description: >-
      Inference backend for the LLM.  'auto' will pick the best available.
      llama.cpp supports Vulkan/ROCm/CPU/Metal; FastFlowLM and RyzenAI
      target AMD NPUs.
  llm_context_size:
    name: LLM Context Size
    description: >-
      Maximum context window in tokens (default 4096).
  llm_max_tokens:
    name: LLM Max Tokens
    description: >-
      Maximum number of tokens the LLM will generate per response.
  llm_system_prompt:
    name: LLM System Prompt
    description: >-
      System prompt that defines the personality and behaviour of the
      conversation agent.

  tts_model:
    name: TTS Model
    description: >-
      Text-to-speech model.  Currently only 'kokoro-v1' is available.
  tts_custom_model:
    name: TTS Custom Model
    description: >-
      Name of a custom TTS model in the Lemonade registry
      (only used when TTS Model is set to 'custom').
  tts_voice:
    name: TTS Voice
    description: >-
      Voice used for speech synthesis.  Kokoro voices start with 'af_'
      (American female), 'am_' (American male), 'bf_' (British female),
      'bm_' (British male).  OpenAI voice names are also mapped.

  lemonade_host:
    name: Lemonade Host
    description: >-
      Hostname or IP where the Lemonade server is running.
  lemonade_port:
    name: Lemonade Port
    description: >-
      HTTP port of the Lemonade server (default 8000).
  auto_start_lemonade:
    name: Auto-start Lemonade
    description: >-
      Attempt to start the Lemonade server if it is not already running.
      Only works when Lemonade is installed on the same machine.
  debug_logging:
    name: Debug Logging
    description: >-
      Enable verbose DEBUG-level log output.

network:
  10500/tcp: Wyoming STT (Whisper)
  10600/tcp: Wyoming Conversation (LLM)
  10700/tcp: Wyoming TTS (Kokoro)
